  <text x="24" y="779" font-size="9" fill="#B4B2A9">Sources: docs.databricks.com/aws/en/dev-tools/databricks-apps · docs.databricks.com/aws/en/ai-bi/concepts · databricks.com/blog/announcing-general-availability-databricks-apps</text>

