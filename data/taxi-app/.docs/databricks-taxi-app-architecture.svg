<svg viewBox="0 0 740 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <title>Taxi App — Databricks Apps Architecture</title>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="740" height="380" rx="12" fill="#f8fafc"/>
  <rect width="740" height="380" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ── ZONE: BROWSER x=20..155 ── -->
  <rect x="20" y="20" width="135" height="316" rx="8"
        fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="87" y="40" font-size="9" font-weight="600" letter-spacing="1"
        fill="#94a3b8" text-anchor="middle">BROWSER</text>

  <!-- User -->
  <circle cx="87" cy="86" r="20" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="87" cy="79" r="8" fill="#94a3b8"/>
  <path d="M69,100 Q87,91 105,100" fill="#94a3b8"/>
  <text x="87" y="117" font-size="10" fill="#64748b" text-anchor="middle">User</text>

  <!-- Frontend box -->
  <rect x="30" y="184" width="115" height="60" rx="6"
        fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="87" y="206" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">🧑‍💻 Frontend</text>
  <text x="87" y="221" font-size="9" fill="#64748b" text-anchor="middle">Alpine.js SPA</text>
  <text x="87" y="234" font-size="9" fill="#64748b" text-anchor="middle">static/index.html</text>

  <!-- ── ZONE: DATABRICKS APPS x=175..440 ── -->
  <rect x="175" y="20" width="265" height="316" rx="8"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="307" y="40" font-size="9" font-weight="600" letter-spacing="1"
        fill="#3b82f6" text-anchor="middle">DATABRICKS APPS</text>

  <!-- Backend box -->
  <rect x="190" y="60" width="235" height="68" rx="6"
        fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="307" y="82" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">🧑‍💻 Backend</text>
  <text x="307" y="97" font-size="9" fill="#64748b" text-anchor="middle">FastAPI · main.py + api/</text>
  <text x="307" y="112" font-size="9" fill="#64748b" text-anchor="middle">Databricks SQL Connector</text>

  <!-- Service Principal box -->
  <rect x="190" y="150" width="235" height="68" rx="6"
        fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="307" y="172" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">⚙️ Service Principal</text>
  <text x="307" y="187" font-size="9" fill="#64748b" text-anchor="middle">Auto-injected by runtime</text>
  <text x="307" y="202" font-size="9" fill="#64748b" text-anchor="middle">OAuth M2M · no token in browser</text>

  <!-- app.yaml box -->
  <rect x="190" y="240" width="235" height="60" rx="6"
        fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="307" y="263" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">🧑‍💻 app.yaml</text>
  <text x="307" y="278" font-size="9" fill="#64748b" text-anchor="middle">Entrypoint · env vars config</text>

  <!-- ── ZONE: WORKSPACE x=460..720 ── -->
  <rect x="460" y="20" width="260" height="316" rx="8"
        fill="#f0fdf4" stroke="#86efac" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="590" y="40" font-size="9" font-weight="600" letter-spacing="1"
        fill="#16a34a" text-anchor="middle">DATABRICKS WORKSPACE</text>

  <!-- SQL Warehouse box -->
  <rect x="475" y="60" width="230" height="68" rx="6"
        fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="82" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">⚙️ SQL Warehouse</text>
  <text x="590" y="97" font-size="9" fill="#64748b" text-anchor="middle">Serverless</text>
  <text x="590" y="112" font-size="9" fill="#64748b" text-anchor="middle">Executes queries from api/</text>

  <!-- Delta Lake / Unity Catalog box -->
  <rect x="475" y="150" width="230" height="68" rx="6"
        fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="172" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">⚙️ Delta Lake + Unity Catalog</text>
  <text x="590" y="187" font-size="9" fill="#64748b" text-anchor="middle">nyc_taxi.trips</text>
  <text x="590" y="202" font-size="9" fill="#64748b" text-anchor="middle">Governed · row-level security</text>

  <!-- Data Pipeline box -->
  <rect x="475" y="240" width="230" height="60" rx="6"
        fill="#ffffff" stroke="#86efac" stroke-width="1.2"/>
  <text x="590" y="263" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">🧑‍💻 Data Pipeline</text>
  <text x="590" y="278" font-size="9" fill="#64748b" text-anchor="middle">scripts/*.sql · ingest + transform</text>

  <!-- ══════════ ARROWS ══════════ -->

  <!-- User → Frontend (vertical, clean) -->
  <line x1="87" y1="108" x2="87" y2="182"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Frontend → Backend (horizontal right, at y=214 center of frontend box) -->
  <line x1="146" y1="214" x2="188" y2="94"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="142" y="158" font-size="8" fill="#64748b" text-anchor="end">HTTP</text>

  <!-- Backend → Frontend response (parallel, offset slightly) -->
  <line x1="188" y1="108" x2="146" y2="224"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="164" y="178" font-size="8" fill="#94a3b8">JSON</text>

  <!-- Backend → Service Principal (vertical down inside apps zone) -->
  <line x1="307" y1="130" x2="307" y2="148"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backend → SQL Warehouse (horizontal right) -->
  <line x1="426" y1="94" x2="473" y2="94"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="449" y="89" font-size="8" fill="#64748b" text-anchor="middle">SQL</text>

  <!-- SQL Warehouse → Backend response -->
  <line x1="473" y1="108" x2="426" y2="108"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="449" y="120" font-size="8" fill="#94a3b8" text-anchor="middle">rows</text>

  <!-- SQL Warehouse → Delta (vertical down inside workspace zone) -->
  <line x1="590" y1="130" x2="590" y2="148"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Data Pipeline → Delta (vertical up) -->
  <line x1="590" y1="238" x2="590" y2="220"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="596" y="232" font-size="8" fill="#94a3b8">writes</text>

  <!-- ── LEGEND ── -->
  <rect x="20" y="352" width="700" height="20" rx="4"
        fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="366" font-size="9" fill="#64748b">⚙️  Managed by Databricks</text>
  <text x="230" y="366" font-size="9" fill="#64748b">🧑‍💻  Managed by Developer</text>
  <line x1="430" y1="362" x2="450" y2="362" stroke="#64748b" stroke-width="1.5"/>
  <text x="456" y="366" font-size="9" fill="#64748b">Request</text>
  <line x1="560" y1="362" x2="580" y2="362" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="586" y="366" font-size="9" fill="#94a3b8">Response / data flow</text>
</svg>
